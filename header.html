<script>
// Полноэкранное меню — гарантированно работает
(function() {
    // Получаем элементы
    var menuBtn = document.getElementById('menuBtn');
    var fullscreenMenu = document.getElementById('fullscreenMenu');
    var menuClose = document.getElementById('menuClose');
    
    // Функция открытия меню
    function openMenu() {
        if (fullscreenMenu) {
            fullscreenMenu.classList.add('active');
            document.body.style.overflow = 'hidden'; // блокируем скролл
        }
    }
    
    // Функция закрытия меню
    function closeMenu() {
        if (fullscreenMenu) {
            fullscreenMenu.classList.remove('active');
            document.body.style.overflow = ''; // возвращаем скролл
        }
    }
    
    // Открытие по клику на кнопку МЕНЮ
    if (menuBtn) {
        menuBtn.addEventListener('click', openMenu);
    }
    
    // Закрытие по крестику
    if (menuClose) {
        menuClose.addEventListener('click', closeMenu);
    }
    
    // Закрытие по клику на любую ссылку в меню
    var navLinks = document.querySelectorAll('.fullscreen-nav-link');
    for (var i = 0; i < navLinks.length; i++) {
        navLinks[i].addEventListener('click', closeMenu);
    }
    
    // Закрытие по клавише ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && fullscreenMenu && fullscreenMenu.classList.contains('active')) {
            closeMenu();
        }
    });
    
    // Закрытие при клике на фон (по желанию)
    if (fullscreenMenu) {
        fullscreenMenu.addEventListener('click', function(e) {
            if (e.target === fullscreenMenu) {
                closeMenu();
            }
        });
    }
})();
</script>
