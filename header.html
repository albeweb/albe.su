<script>
(function() {
    var menuBtn = document.getElementById('menuBtn');
    var fullscreenMenu = document.getElementById('fullscreenMenu');
    var menuClose = document.getElementById('menuClose');
    
    if (menuBtn && fullscreenMenu) {
        menuBtn.onclick = function(e) {
            e.preventDefault();
            fullscreenMenu.style.display = 'block';
            document.body.style.overflow = 'hidden';
        };
    }
    
    if (menuClose) {
        menuClose.onclick = function() {
            fullscreenMenu.style.display = 'none';
            document.body.style.overflow = '';
        };
    }
    
    var links = fullscreenMenu ? fullscreenMenu.querySelectorAll('a') : [];
    for (var i = 0; i < links.length; i++) {
        links[i].onclick = function() {
            fullscreenMenu.style.display = 'none';
            document.body.style.overflow = '';
        };
    }
    
    document.onkeydown = function(e) {
        if (e.key === 'Escape' && fullscreenMenu && fullscreenMenu.style.display === 'block') {
            fullscreenMenu.style.display = 'none';
            document.body.style.overflow = '';
        }
    };
})();
</script>
