<style>
/* Стили для новой кнопки МЕНЮ и полноэкранного меню */
.menu-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: transparent;
    border: 1px solid rgba(245, 183, 0, 0.4);
    padding: 10px 24px;
    border-top-left-radius: 28px;
    border-bottom-right-radius: 28px;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    font-weight: 500;
    font-size: 0.9rem;
    color: #F5B700;
    transition: all 0.3s ease;
    background: rgba(18, 24, 32, 0.6);
    backdrop-filter: blur(4px);
}
.menu-btn:hover {
    border-color: #F5B700;
    background: rgba(245, 183, 0, 0.1);
    transform: translateY(-2px);
}
.menu-btn-icon {
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.menu-btn-icon span {
    width: 18px;
    height: 2px;
    background: #F5B700;
    transition: 0.3s;
}
.menu-btn-icon span:first-child {
    width: 12px;
}
.menu-btn-icon span:last-child {
    width: 18px;
}

/* Полноэкранное меню, открывающееся сверху */
.fullscreen-menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 0;
    background: rgba(13, 17, 23, 0.98);
    backdrop-filter: blur(16px);
    z-index: 2000;
    overflow: hidden;
    transition: height 0.4s ease-in-out;
}
.fullscreen-menu.active {
    height: 100%;
}
.fullscreen-menu-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 60px 40px;
    position: relative;
}
.menu-close {
    position: absolute;
    top: 30px;
    right: 40px;
    background: transparent;
    border: 1px solid rgba(245, 183, 0, 0.4);
    width: 48px;
    height: 48px;
    border-top-left-radius: 24px;
    border-bottom-right-radius: 24px;
    cursor: pointer;
    font-size: 1.5rem;
    color: #F5B700;
    transition: all 0.3s ease;
}
.menu-close:hover {
    border-color: #F5B700;
    background: rgba(245, 183, 0, 0.1);
    transform: scale(1.05);
}
.fullscreen-nav-list {
    list-style: none;
    text-align: center;
    padding: 0;
    margin: 0;
}
.fullscreen-nav-list li {
    margin: 1.5rem 0;
}
.fullscreen-nav-link {
    font-family: 'Manrope', sans-serif;
    font-size: 2.2rem;
    font-weight: 500;
    color: #FFFFFF;
    text-decoration: none;
    letter-spacing: -0.02em;
    transition: all 0.3s ease;
    position: relative;
    display: inline-block;
}
.fullscreen-nav-link:hover {
    color: #F5B700;
    transform: translateY(-3px);
}
.fullscreen-nav-link::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 2px;
    background: #F5B700;
    transition: width 0.3s ease;
}
.fullscreen-nav-link:hover::after {
    width: 100%;
}
.fullscreen-nav-contact {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(245, 183, 0, 0.2);
    display: flex;
    gap: 2rem;
    justify-content: center;
    flex-wrap: wrap;
}
.fullscreen-telegram, .fullscreen-email {
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    color: #B0C4DE;
    text-decoration: none;
    transition: 0.3s;
}
.fullscreen-telegram:hover, .fullscreen-email:hover {
    color: #F5B700;
}
@media (max-width: 768px) {
    .fullscreen-nav-link {
        font-size: 1.6rem;
    }
    .fullscreen-nav-contact {
        flex-direction: column;
        gap: 1rem;
        align-items: center;
    }
    .menu-btn {
        padding: 6px 16px;
        font-size: 0.8rem;
    }
    .menu-close {
        top: 20px;
        right: 20px;
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
    }
}
</style>

<script>
// Полноэкранное меню
(function() {
    const menuBtn = document.getElementById('menuBtn');
    const fullscreenMenu = document.getElementById('fullscreenMenu');
    const menuClose = document.getElementById('menuClose');
    
    if (menuBtn && fullscreenMenu) {
        // Открытие меню
        menuBtn.addEventListener('click', function() {
            fullscreenMenu.classList.add('active');
            document.body.style.overflow = 'hidden';
        });
        
        // Закрытие через крестик
        if (menuClose) {
            menuClose.addEventListener('click', function() {
                fullscreenMenu.classList.remove('active');
                document.body.style.overflow = '';
            });
        }
        
        // Закрытие при клике на ссылку
        const navLinks = document.querySelectorAll('.fullscreen-nav-link');
        navLinks.forEach(function(link) {
            link.addEventListener('click', function() {
                fullscreenMenu.classList.remove('active');
                document.body.style.overflow = '';
            });
        });
        
        // Закрытие по ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && fullscreenMenu.classList.contains('active')) {
                fullscreenMenu.classList.remove('active');
                document.body.style.overflow = '';
            }
        });
    }
})();
</script>
